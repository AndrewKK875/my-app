name: Deploy Havalgame3 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - Havalgame3/**
      - .github/workflows/deploy-havalgame3.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Havalgame3
        uses: actions/upload-pages-artifact@v3
        with:
          path: Havalgame3

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
