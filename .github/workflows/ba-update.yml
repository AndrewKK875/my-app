name: Brand Analytics — обновление данных

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # каждый день в 6:00 UTC (9:00 МСК)
  workflow_dispatch:        # ручной запуск из GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  linnimax:
    name: Линнимакс (ID 14015636)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Загрузить статистику
        env:
          BA_API_KEY: ${{ secrets.BA_API_KEY }}
        run: node ba-linni/dashboard/fetch_data.js

      - name: Выгрузить и классифицировать сообщения
        env:
          BA_LOGIN: ${{ secrets.BA_LOGIN }}
          BA_SECRET_KEY: ${{ secrets.BA_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: node ba-linni/fetch_messages.js

      - name: Сохранить данные в репозиторий
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ba-linni/dashboard/data/
          git diff --cached --quiet && echo "Нет изменений" && exit 0
          git commit -m "chore: Линнимакс — обновление данных $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull origin main --no-rebase -X ours
          git push

  tikkurila:
    name: Тиккурила (ID 14078430)
    runs-on: ubuntu-latest
    needs: linnimax
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Загрузить данные
        env:
          BA_API_KEY: ${{ secrets.BA_API_KEY }}
        run: node ba-tikk/dashboard/fetch_data.js

      - name: Сохранить данные в репозиторий
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ba-tikk/dashboard/data/
          git diff --cached --quiet && echo "Нет изменений" && exit 0
          git commit -m "chore: Тиккурила — обновление данных $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull origin main --no-rebase -X ours
          git push

  liaz:
    name: Лиаз (ID 14187919)
    runs-on: ubuntu-latest
    needs: tikkurila
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Загрузить данные
        env:
          BA_API_KEY: ${{ secrets.BA_API_KEY }}
        run: node ba-liaz/dashboard/fetch_data.js

      - name: Сохранить данные в репозиторий
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ba-liaz/dashboard/data/
          git diff --cached --quiet && echo "Нет изменений" && exit 0
          git commit -m "chore: Лиаз — обновление данных $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull origin main --no-rebase -X ours
          git push

  exeed:
    name: Эксид+Экслантикс (ID 14158990)
    runs-on: ubuntu-latest
    needs: liaz
    permissions:
      contents: write

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Загрузить данные
        env:
          BA_API_KEY: ${{ secrets.BA_API_KEY }}
        run: node ba-exeed/dashboard/fetch_data.js

      - name: Сохранить данные в репозиторий
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ba-exeed/dashboard/data/
          git diff --cached --quiet && echo "Нет изменений" && exit 0
          git commit -m "chore: Эксид+Экслантикс — обновление данных $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull origin main --no-rebase -X ours
          git push
