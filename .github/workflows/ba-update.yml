name: Brand Analytics — обновление данных

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'   # каждый день в 6:00 UTC (9:00 МСК)
  workflow_dispatch:        # ручной запуск из GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Загрузить данные из Brand Analytics API
        env:
          BA_API_KEY: ${{ secrets.BA_API_KEY }}
        run: node ba-linni/dashboard/fetch_data.js

      - name: Сохранить данные в репозиторий
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ba-linni/dashboard/data/
          git diff --cached --quiet || git commit -m "chore: обновление данных BA $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
