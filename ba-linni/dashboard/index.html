<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brand Analytics Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #1a1a2e; }

  header { background: #1e3a5f; color: #fff; padding: 20px 32px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 20px; font-weight: 600; }
  #updated { font-size: 12px; opacity: 0.7; }

  .month-bar { background: #fff; border-bottom: 1px solid #e0e4ea; padding: 12px 32px; display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .month-bar span { font-size: 13px; color: #666; margin-right: 4px; }
  .month-btn { padding: 6px 14px; border: 1px solid #c5cfe0; border-radius: 20px; background: #fff; cursor: pointer; font-size: 13px; color: #444; transition: all .15s; }
  .month-btn:hover { border-color: #1e3a5f; color: #1e3a5f; }
  .month-btn.active { background: #1e3a5f; color: #fff; border-color: #1e3a5f; }

  main { max-width: 1200px; margin: 0 auto; padding: 24px 24px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .card .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
  .card .value { font-size: 28px; font-weight: 700; }
  .card.positive .value { color: #1a7a3c; }
  .card.negative .value { color: #c0392b; }
  .card.neutral  .value { color: #2471a3; }
  .card.net .value { color: #6c3483; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 768px) { .row { grid-template-columns: 1fr; } }

  .panel { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  .panel h2 { font-size: 15px; font-weight: 600; color: #1e3a5f; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid #eef0f4; }

  .chart-wrap { position: relative; height: 240px; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; background: #f6f8fb; color: #555; font-weight: 600; border-bottom: 2px solid #e0e4ea; }
  td { padding: 7px 10px; border-bottom: 1px solid #f0f2f5; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #fafbfd; }
  .pos { color: #1a7a3c; font-weight: 600; }
  .neg { color: #c0392b; font-weight: 600; }
  .neu { color: #2471a3; }
  .bar-bg { background: #eef0f4; border-radius: 4px; height: 6px; min-width: 60px; }
  .bar-fg { background: #1e3a5f; border-radius: 4px; height: 6px; }

  #loading { text-align: center; padding: 60px; color: #888; font-size: 16px; }
  #error   { text-align: center; padding: 60px; color: #c0392b; font-size: 15px; }
</style>
</head>
<body>

<header>
  <h1>Brand Analytics — Дашборд</h1>
  <span id="updated"></span>
</header>

<div class="month-bar">
  <span>Месяц:</span>
  <div id="month-buttons"></div>
</div>

<main>
  <div id="loading">Загрузка данных...</div>
  <div id="error" style="display:none"></div>
  <div id="content" style="display:none">

    <div class="cards">
      <div class="card"><div class="label">Сообщений</div><div class="value" id="c-total"></div></div>
      <div class="card positive"><div class="label">Позитив</div><div class="value" id="c-pos"></div></div>
      <div class="card neutral"><div class="label">Нейтрал</div><div class="value" id="c-neu"></div></div>
      <div class="card negative"><div class="label">Негатив</div><div class="value" id="c-neg"></div></div>
      <div class="card net"><div class="label">Net Sentiment</div><div class="value" id="c-net"></div></div>
    </div>

    <div class="row">
      <div class="panel">
        <h2>Сообщений по дням</h2>
        <div class="chart-wrap"><canvas id="chart-daily"></canvas></div>
      </div>
      <div class="panel">
        <h2>Тональность по дням</h2>
        <div class="chart-wrap"><canvas id="chart-tone"></canvas></div>
      </div>
    </div>

    <div class="row">
      <div class="panel">
        <h2>Площадки</h2>
        <div style="overflow-x:auto"><table id="table-hubs"></table></div>
      </div>
      <div class="panel">
        <h2>Типы площадок</h2>
        <div style="overflow-x:auto"><table id="table-types"></table></div>
      </div>
    </div>

  </div>
</main>

<script>
const BASE = './data';
let chartDaily = null, chartTone = null;

async function loadJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

function show(id) { document.getElementById(id).style.display = ''; }
function hide(id) { document.getElementById(id).style.display = 'none'; }

async function init() {
  try {
    const idx = await loadJSON(BASE + '/index.json');
    document.getElementById('updated').textContent =
      'Обновлено: ' + new Date(idx.updatedAt).toLocaleString('ru-RU');

    const btns = document.getElementById('month-buttons');
    idx.months.forEach((m, i) => {
      const btn = document.createElement('button');
      btn.className = 'month-btn' + (i === idx.months.length - 1 ? ' active' : '');
      btn.textContent = m.label;
      btn.dataset.key = m.key;
      btn.addEventListener('click', () => {
        document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        loadMonth(m.key);
      });
      btns.appendChild(btn);
    });

    hide('loading');
    show('content');
    await loadMonth(idx.months[idx.months.length - 1].key);
  } catch (e) {
    hide('loading');
    document.getElementById('error').textContent = 'Ошибка загрузки: ' + e.message;
    show('error');
  }
}

async function loadMonth(key) {
  try {
    const d = await loadJSON(BASE + '/' + key + '.json');
    renderCards(d.summary);
    renderDailyChart(d.dailyTone);
    renderToneChart(d.dailyTone);
    renderTable('table-hubs', d.hubs,
      ['Площадка','Сообщений','Доля %','Позитив','Нейтрал','Негатив'],
      h => [h.name, h.msgs, h.percent+'%',
            `<span class="pos">${h.positive}</span>`,
            `<span class="neu">${h.neutral}</span>`,
            `<span class="neg">${h.negative}</span>`],
      d.hubs[0]?.msgs || 1
    );
    renderTable('table-types', d.hubtypes,
      ['Тип','Сообщений','Доля %','Позитив','Нейтрал','Негатив'],
      t => [t.name, t.msgs, t.percent+'%',
            `<span class="pos">${t.positive}</span>`,
            `<span class="neu">${t.neutral}</span>`,
            `<span class="neg">${t.negative}</span>`],
      d.hubtypes[0]?.msgs || 1
    );
  } catch (e) {
    console.error(e);
  }
}

function renderCards(s) {
  document.getElementById('c-total').textContent = s.totalMsgs;
  document.getElementById('c-pos').textContent = s.positive;
  document.getElementById('c-neu').textContent = s.neutral;
  document.getElementById('c-neg').textContent = s.negative;
  const net = document.getElementById('c-net');
  net.textContent = (s.netSentiment > 0 ? '+' : '') + s.netSentiment;
  net.style.color = s.netSentiment >= 0 ? '#1a7a3c' : '#c0392b';
}

function renderDailyChart(daily) {
  const labels = daily.map(d => d.date.slice(5));
  const data   = daily.map(d => d.msgs);
  if (chartDaily) chartDaily.destroy();
  chartDaily = new Chart(document.getElementById('chart-daily'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Сообщений', data, backgroundColor: '#1e3a5f', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
      scales: { x: { ticks: { maxTicksLimit: 10 } } } }
  });
}

function renderToneChart(daily) {
  const labels = daily.map(d => d.date.slice(5));
  if (chartTone) chartTone.destroy();
  chartTone = new Chart(document.getElementById('chart-tone'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Позитив', data: daily.map(d => d.positive), backgroundColor: '#1a7a3c', borderRadius: 2 },
        { label: 'Нейтрал', data: daily.map(d => d.neutral),  backgroundColor: '#2471a3', borderRadius: 2 },
        { label: 'Негатив', data: daily.map(d => d.negative), backgroundColor: '#c0392b', borderRadius: 2 },
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } },
      scales: { x: { stacked: true, ticks: { maxTicksLimit: 10 } }, y: { stacked: true } } }
  });
}

function renderTable(id, rows, headers, rowFn, maxMsgs) {
  const t = document.getElementById(id);
  t.innerHTML =
    '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>' +
    rows.map(r => {
      const cells = rowFn(r);
      const msgsVal = typeof r.msgs === 'number' ? r.msgs : 0;
      const barPct = Math.round(msgsVal / maxMsgs * 100);
      const barCell = `<td><div class="bar-bg"><div class="bar-fg" style="width:${barPct}%"></div></div></td>`;
      return '<tr>' + cells.map((c,i) => i === 1
        ? `<td>${c}${barCell}</td>`.replace(`<td>${c}`, `<td><b>${c}</b>`)
        : `<td>${c}</td>`
      ).join('').replace(/(<td><b>\d+<\/b>)<td>.*?<\/td>/, '$1') + '</tr>';
    }).join('');
  // Упрощённый рендер без встроенного бара
  t.innerHTML =
    '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>' +
    rows.map(r => '<tr>' + rowFn(r).map(c => `<td>${c}</td>`).join('') + '</tr>').join('');
}

init();
</script>
</body>
</html>
