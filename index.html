<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>L'Oréal Memory</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      background: #fff5f7;
    }

    /* ── HOME SCREEN ── */
    #home-screen {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(env(safe-area-inset-bottom) + 0px);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      background: #fff;
      overflow: hidden;
      position: relative;
    }

    .home-topbar {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      position: relative;
      padding: 20px 20px 0;
    }

    .loreal-logo {
      text-align: center;
    }

    .loreal-logo-main {
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: 3px;
      color: #111;
      text-transform: uppercase;
      line-height: 1;
    }

    .loreal-logo-sub {
      font-size: 0.6rem;
      letter-spacing: 4px;
      font-weight: 400;
      color: #111;
      text-transform: uppercase;
      display: block;
      margin-top: 2px;
    }

    .home-settings {
      position: absolute;
      right: 20px;
      top: 20px;
      font-size: 1.2rem;
      color: #555;
      cursor: pointer;
    }

    .home-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 28px 0;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .home-title {
      font-size: clamp(2rem, 9vw, 2.8rem);
      font-weight: 900;
      color: #e8527a;
      line-height: 1.05;
      margin: 0 0 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .home-title .sparkles {
      color: #c9a84c;
      font-size: 0.65em;
      letter-spacing: 2px;
    }

    .home-subtitle {
      color: #555;
      font-size: clamp(0.82rem, 3.5vw, 0.95rem);
      margin: 10px 0 0;
      max-width: 240px;
      line-height: 1.5;
    }

    .home-products-wrap {
      flex: 1;
      position: relative;
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .home-pink-bg {
      position: absolute;
      bottom: 0;
      left: -10%;
      width: 120%;
      height: 58%;
      background: linear-gradient(180deg, #fde8ef 0%, #f9c8d8 100%);
      border-radius: 50% 50% 0 0 / 30% 30% 0 0;
      z-index: 0;
    }

    .home-products {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: clamp(6px, 3vw, 16px);
      padding-bottom: 0;
      width: 100%;
      max-width: 340px;
    }

    .home-products img {
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.18));
    }

    .prod-jar   { width: clamp(56px, 15vw, 72px);  height: clamp(56px, 15vw, 72px); }
    .prod-lip   { width: clamp(24px, 7vw, 32px);   height: clamp(90px, 24vw, 120px); }
    .prod-elseve{ width: clamp(52px, 14vw, 68px);  height: clamp(120px, 32vw, 160px); }
    .prod-found { width: clamp(28px, 8vw, 36px);   height: clamp(100px, 28vw, 130px); }

    .home-bottom {
      background: linear-gradient(180deg, #f9c8d8 0%, #f5a8c0 100%);
      padding: 20px 28px calc(env(safe-area-inset-bottom) + 28px);
      width: 100%;
    }

    #play-btn {
      display: block;
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #e8527a, #c94070);
      color: #fff;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(201,64,112,0.4);
      touch-action: manipulation;
      min-height: 54px;
      -webkit-appearance: none;
    }

    #play-btn:active {
      transform: scale(0.97);
    }

    /* ── GAME SCREEN ── */
    #game-screen {
      display: none;
      flex-direction: column;
      min-height: 100dvh;
      padding-top: env(safe-area-inset-top);
      padding-bottom: calc(env(safe-area-inset-bottom) + 16px);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      background: #1a1a2e;
    }

    #game-screen h1 {
      text-align: center;
      color: #c9a84c;
      font-size: clamp(1.2rem, 5vw, 1.8rem);
      letter-spacing: 3px;
      margin: 16px 0 6px;
    }

    #score {
      text-align: center;
      color: rgba(255,255,255,0.8);
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(6px, 2vw, 12px);
      padding: 0 clamp(8px, 3vw, 20px);
      max-width: 520px;
      margin: 0 auto;
    }

    @media (min-width: 540px) {
      .grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 680px;
      }
    }

    .card {
      position: relative;
      transition: transform 0.4s ease;
      transform-style: preserve-3d;
      cursor: pointer;
      aspect-ratio: 1;
      user-select: none;
      -webkit-user-select: none;
    }

    .card.selected {
      transform: rotateY(180deg);
    }

    .front, .back {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .front {
      z-index: 2;
      background: #c9a84c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.4rem, 6vw, 2rem);
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }

    .back {
      transform: rotateY(180deg);
      background-color: #fff;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.5);
    }

    .card.match .front {
      background: #1e4a0e;
    }

    .card.match .back {
      box-shadow: 0 0 0 3px #4caf50, 0 3px 10px rgba(0,0,0,0.5);
    }

    #win-message {
      display: none;
      text-align: center;
      color: #c9a84c;
      font-size: clamp(1.1rem, 5vw, 1.5rem);
      margin: 20px 16px 0;
      animation: pop 0.5s ease;
    }

    @keyframes pop {
      0%   { opacity: 0; transform: scale(0.7); }
      70%  { transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    #restart {
      display: block;
      margin: 16px auto 0;
      padding: 14px 36px;
      background: #c9a84c;
      color: #1a1a2e;
      border: none;
      border-radius: 50px;
      font-size: clamp(0.9rem, 4vw, 1rem);
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      touch-action: manipulation;
      min-height: 48px;
    }

    #restart:active {
      background: #e8c96a;
      transform: scale(0.97);
    }
  </style>
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="home-screen">
    <div class="home-topbar">
      <div class="loreal-logo">
        <div class="loreal-logo-main">L'ORÉAL</div>
        <span class="loreal-logo-sub">Paris</span>
      </div>
      <div class="home-settings">⚙</div>
    </div>

    <div class="home-content">
      <h1 class="home-title">
        Beauty <span class="sparkles">✦ ✦</span><br>
        Memory<br>
        Match
      </h1>
      <p class="home-subtitle">Match iconic L'Oréal Paris products and win rewards!</p>
    </div>

    <div class="home-products-wrap">
      <div class="home-pink-bg"></div>
      <div class="home-products">
        <img class="prod-jar" src="https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/consumer-products-division/loreal-paris/2025/2025-loreal-consumer-products-division-brand-revitalift-age-correcting-serum-red-bottle.png" alt="Revitalift">
        <img class="prod-lip" src="https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/loreal-luxe-division/ysl/2026/2026-luxe-division-brand-ysl-beauty-black-mascara-silver-bottle.png" alt="Lipstick">
        <img class="prod-elseve" src="https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/professional-products/kerastase/2025/2025-kerastase-loreal-professional-product-exilir-yellow-transparent-bottle-with-black-top.png" alt="Elseve">
        <img class="prod-found" src="https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/consumer-products-division/loreal-paris/2025/2025-loreal-consumer-products-division-brand-anti-fall-scalp-serum-orange-bottle.png" alt="Foundation">
      </div>
    </div>

    <div class="home-bottom">
      <button id="play-btn">Play Now</button>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <h1>L'ORÉAL MEMORY</h1>
    <div id="score">Попыток: <span id="count">0</span> &nbsp;|&nbsp; Совпадений: <span id="matches">0</span> / 6</div>
    <div id="game" class="grid"></div>
    <div id="win-message">🎉 Поздравляем! Все пары найдены!</div>
    <button id="restart">Начать заново</button>
  </div>

  <script>
    const cardsArray = [
      {
        name: 'revitalift-serum',
        img: 'https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/consumer-products-division/loreal-paris/2025/2025-loreal-consumer-products-division-brand-revitalift-age-correcting-serum-red-bottle.png',
        label: 'Revitalift Serum'
      },
      {
        name: 'anti-fall-serum',
        img: 'https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/consumer-products-division/loreal-paris/2025/2025-loreal-consumer-products-division-brand-anti-fall-scalp-serum-orange-bottle.png',
        label: 'Anti-Fall Serum'
      },
      {
        name: 'ysl-perfume',
        img: 'https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/loreal-luxe-division/ysl/2026/2026-luxe-division-brand-ysl-beauty-perfume-bottle-with-berries-and-flowers.png',
        label: 'YSL Perfume'
      },
      {
        name: 'ysl-mascara',
        img: 'https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/loreal-luxe-division/ysl/2026/2026-luxe-division-brand-ysl-beauty-black-mascara-silver-bottle.png',
        label: 'YSL Mascara'
      },
      {
        name: 'kerastase-elixir',
        img: 'https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/professional-products/kerastase/2025/2025-kerastase-loreal-professional-product-exilir-yellow-transparent-bottle-with-black-top.png',
        label: 'Kérastase Elixir'
      },
      {
        name: 'redken-treatment',
        img: 'https://www.loreal.com/-/media/project/loreal/brand-sites/corp/master/lcorp/4-brands/professional-products/redken/2025/2025-loreal-professional-products-division-all-in-one-multibenefit-treatment-grey-bottle.png',
        label: 'Redken All-in-One'
      },
    ];

    let firstGuess = '';
    let secondGuess = '';
    let count = 0;
    let matchCount = 0;
    let busy = false;
    const delay = 1000;

    function shuffle(array) {
      const arr = [...array, ...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function updateScore() {
      document.getElementById('count').textContent = count;
      document.getElementById('matches').textContent = matchCount;
    }

    function initGame() {
      firstGuess = '';
      secondGuess = '';
      count = 0;
      matchCount = 0;
      busy = false;
      document.getElementById('win-message').style.display = 'none';
      updateScore();

      const game = document.getElementById('game');
      game.innerHTML = '';

      shuffle(cardsArray).forEach(item => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.dataset.name = item.name;

        const front = document.createElement('div');
        front.classList.add('front');
        front.textContent = '✦';

        const back = document.createElement('div');
        back.classList.add('back');
        back.style.backgroundImage = `url('${item.img}')`;

        card.appendChild(front);
        card.appendChild(back);
        game.appendChild(card);

        card.addEventListener('click', onCardClick);
      });
    }

    function onCardClick(e) {
      const card = e.currentTarget;
      if (busy) return;
      if (card.classList.contains('selected')) return;
      if (card.classList.contains('match')) return;

      card.classList.add('selected');

      if (!firstGuess) {
        firstGuess = card;
        count++;
        updateScore();
        return;
      }

      secondGuess = card;
      count++;
      updateScore();
      busy = true;

      if (firstGuess.dataset.name === secondGuess.dataset.name) {
        matchCount++;
        updateScore();
        setTimeout(() => {
          firstGuess.classList.add('match');
          secondGuess.classList.add('match');
          reset();
          if (matchCount === cardsArray.length) {
            document.getElementById('win-message').style.display = 'block';
          }
        }, delay);
      } else {
        setTimeout(() => {
          firstGuess.classList.remove('selected');
          secondGuess.classList.remove('selected');
          reset();
        }, delay);
      }
    }

    function reset() {
      firstGuess = '';
      secondGuess = '';
      busy = false;
    }

    document.getElementById('play-btn').addEventListener('click', () => {
      document.getElementById('home-screen').style.display = 'none';
      const gs = document.getElementById('game-screen');
      gs.style.display = 'flex';
      initGame();
    });

    document.getElementById('restart').addEventListener('click', () => {
      document.getElementById('game-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'flex';
    });
  </script>

</body>
</html>
