<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HAVAL TANK 300 — Rally</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d0d;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      touch-action: none;
      font-family: 'Arial Black', Arial, sans-serif;
    }

    #renderer {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    /* ── LOADING ── */
    #loading {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.5s;
    }
    #loading h1 { color: #fff; font-size: 32px; letter-spacing: 6px; }
    #loading .sub { color: #FF6B00; font-size: 11px; letter-spacing: 4px; margin-top: 6px; }
    #loading .slogan { color: rgba(255,255,255,0.4); font-size: 11px; letter-spacing: 1px; margin-top: 4px; font-weight: normal; }
    #load-bar-bg {
      width: 180px; height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      margin-top: 40px;
      overflow: hidden;
    }
    #load-bar {
      height: 100%;
      background: #FF6B00;
      border-radius: 2px;
      width: 10%;
      transition: width 0.3s;
    }

    /* ── UI OVERLAY ── */
    #ui {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 10;
    }

    /* Header */
    #header {
      position: absolute;
      top: 16px; left: 16px; right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    #title-block h1 {
      color: #fff;
      font-size: 22px;
      letter-spacing: 3px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }
    #title-block .loc {
      color: #FF6B00;
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 2px;
    }
    #title-block .slogan {
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      font-weight: normal;
      letter-spacing: 1px;
      margin-top: 1px;
    }

    /* Minimap */
    #minimap {
      width: 88px; height: 88px;
      background: rgba(0,0,0,0.55);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }
    #minimap-canvas { display: block; }
    #minimap .n-label {
      position: absolute;
      top: 5px; right: 7px;
      color: rgba(255,255,255,0.5);
      font-size: 9px;
      font-weight: bold;
    }
    #dist-label {
      position: absolute;
      bottom: -22px; right: 0;
      color: rgba(255,255,255,0.6);
      font-size: 9px;
      letter-spacing: 0.5px;
      text-align: right;
    }

    /* Speed */
    #speed-block {
      position: absolute;
      bottom: 180px;
      left: 20px;
    }
    #speed-value {
      color: #fff;
      font-size: 48px;
      line-height: 1;
      text-shadow: 0 2px 12px rgba(0,0,0,0.9);
    }
    #speed-unit {
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      letter-spacing: 2px;
      margin-top: 2px;
    }

    /* Terrain modes */
    #terrain-modes {
      position: absolute;
      bottom: 180px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      background: rgba(0,0,0,0.45);
      padding: 8px 14px;
      border-radius: 28px;
      backdrop-filter: blur(4px);
    }
    .t-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      padding: 4px 8px;
      border-radius: 16px;
      cursor: pointer;
      pointer-events: all;
    }
    .t-btn .icon { font-size: 14px; }
    .t-btn .label {
      color: rgba(255,255,255,0.4);
      font-size: 8px;
      letter-spacing: 1px;
    }
    .t-btn.active .label { color: #FF6B00; }
    .t-btn.active { background: rgba(255,107,0,0.15); }

    /* Joystick */
    #joystick-zone {
      position: absolute;
      bottom: 24px; left: 0; right: 0;
      height: 140px;
      pointer-events: all;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #joystick-base {
      width: 96px; height: 96px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.18);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #joystick-knob {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(255,107,0,0.85);
      border: 2px solid #FF6B00;
      position: absolute;
      box-shadow: 0 0 12px rgba(255,107,0,0.5);
    }

    /* Keyboard hint */
    #kb-hint {
      position: absolute;
      bottom: 32px; right: 20px;
      color: rgba(255,255,255,0.25);
      font-size: 10px;
      font-weight: normal;
      letter-spacing: 1px;
      line-height: 1.6;
      text-align: right;
    }
  </style>
</head>
<body>

<div id="loading">
  <h1>TANK 300</h1>
  <div class="sub">HAVAL RALLY</div>
  <div class="slogan">Твой путь. Твой TANK.</div>
  <div id="load-bar-bg"><div id="load-bar"></div></div>
</div>

<div id="renderer"></div>

<div id="ui">
  <!-- Header -->
  <div id="header">
    <div id="title-block">
      <h1>TANK 300</h1>
      <div class="loc">Камчатка Trail</div>
      <div class="slogan">Твой путь. Твой TANK.</div>
    </div>
    <div style="position:relative">
      <div id="minimap">
        <canvas id="minimap-canvas" width="88" height="88"></canvas>
        <div class="n-label">N</div>
      </div>
      <div id="dist-label">3.2 КМ<br>до финиша</div>
    </div>
  </div>

  <!-- Speed -->
  <div id="speed-block">
    <div id="speed-value">0</div>
    <div id="speed-unit">КМ/Ч</div>
  </div>

  <!-- Terrain modes -->
  <div id="terrain-modes">
    <div class="t-btn" onclick="setTerrain('sand')">
      <div class="icon">🏜</div>
      <div class="label">ПЕСОК</div>
    </div>
    <div class="t-btn active" onclick="setTerrain('rock')">
      <div class="icon">⛰</div>
      <div class="label">КАМНИ</div>
    </div>
    <div class="t-btn" onclick="setTerrain('snow')">
      <div class="icon">❄</div>
      <div class="label">СНЕГ</div>
    </div>
  </div>

  <!-- Joystick -->
  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-knob"></div>
    </div>
  </div>

  <!-- Keyboard hint (desktop) -->
  <div id="kb-hint">WASD / ←↑↓→</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';

// ─── RENDERER ───────────────────────────────────────────────────────────────
const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
const renderer = new THREE.WebGLRenderer({
  antialias: !isMobile,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.shadowMap.autoUpdate = false;
renderer.useLegacyLights = false;
document.getElementById('renderer').appendChild(renderer.domElement);

// ─── SCENE ──────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ab3cc);
scene.fog = new THREE.Fog(0x7ab3cc, 30, 90);

// ─── CAMERA ─────────────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(
  isMobile ? 52 : 45,
  window.innerWidth / window.innerHeight,
  0.1,
  isMobile ? 120 : 160
);

// ─── LIGHTING ───────────────────────────────────────────────────────────────
const sun = new THREE.DirectionalLight(0xfff5d0, 2.2);
sun.position.set(15, 25, 10);
sun.castShadow = true;
sun.shadow.mapSize.set(512, 512);
sun.shadow.camera.near = 1;
sun.shadow.camera.far = 80;
sun.shadow.camera.left = -25;
sun.shadow.camera.right = 25;
sun.shadow.camera.top = 25;
sun.shadow.camera.bottom = -25;
scene.add(sun);
scene.add(sun.target);

const hemi = new THREE.HemisphereLight(0x7ab3cc, 0x6b8c42, 1.0);
scene.add(hemi);

// ─── TERRAIN ────────────────────────────────────────────────────────────────
const terrainColors = {
  rock:  { ground: 0x4a7c3f, road: 0x7a6352, fog: 0x7ab3cc, sky: 0x7ab3cc },
  sand:  { ground: 0xc2a060, road: 0xa08040, fog: 0xe8c878, sky: 0xe8c878 },
  snow:  { ground: 0xd8e8f0, road: 0x9aaab8, fog: 0xc8dde8, sky: 0xc8dde8 },
};
let currentTerrain = 'rock';

// Ground with terrain displacement
const groundGeo = new THREE.PlaneGeometry(200, 500, 60, 120);
groundGeo.rotateX(-Math.PI / 2);
const pos = groundGeo.attributes.position;
for (let i = 0; i < pos.count; i++) {
  const y =
    Math.sin(pos.getX(i) * 0.05) * 1.5 +
    Math.cos(pos.getZ(i) * 0.05) * 1.5;
  pos.setY(i, y);
}
pos.needsUpdate = true;
groundGeo.computeVertexNormals();

// Terrain height sampler — same formula as displacement
function getTerrainY(x, z) {
  return Math.sin(x * 0.05) * 1.5 + Math.cos(z * 0.05) * 1.5;
}
const groundMat = new THREE.MeshStandardMaterial({ color: terrainColors.rock.ground, flatShading: true });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.receiveShadow = true;
scene.add(ground);

// Curved road — flat ribbon along CatmullRom spline
const roadPoints = [
  new THREE.Vector3(  0, 0, -200),
  new THREE.Vector3( 10, 0, -100),
  new THREE.Vector3( -5, 0,    0),
  new THREE.Vector3( 15, 0,  100),
  new THREE.Vector3(  0, 0,  200),
];
const curve = new THREE.CatmullRomCurve3(roadPoints);
const ROAD_WIDTH = 7;
const ROAD_SEGS  = 120;
const up = new THREE.Vector3(0, 1, 0);
const verts = [], idxs = [], uvArr = [];
const pts = curve.getPoints(ROAD_SEGS);
pts.forEach((pt, i) => {
  const t = i / (pts.length - 1);
  const tan = curve.getTangentAt(t);
  const right = new THREE.Vector3().crossVectors(tan, up).normalize();
  const l = pt.clone().addScaledVector(right, -ROAD_WIDTH / 2);
  const r = pt.clone().addScaledVector(right,  ROAD_WIDTH / 2);
  verts.push(l.x, 0.02, l.z, r.x, 0.02, r.z);
  uvArr.push(0, t * 20, 1, t * 20);
  if (i < pts.length - 1) {
    const b = i * 2;
    idxs.push(b, b+1, b+2, b+1, b+3, b+2);
  }
});
const roadGeo = new THREE.BufferGeometry();
roadGeo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
roadGeo.setAttribute('uv',       new THREE.Float32BufferAttribute(uvArr, 2));
roadGeo.setIndex(idxs);
roadGeo.computeVertexNormals();
const roadMat = new THREE.MeshPhongMaterial({ color: terrainColors.rock.road });
const road = new THREE.Mesh(roadGeo, roadMat);
road.receiveShadow = true;
scene.add(road);

// Trees (instanced)
const trunkGeo = new THREE.CylinderGeometry(0.15, 0.22, 1.6, 6);
const trunkMat = new THREE.MeshPhongMaterial({ color: 0x5C3D1E });
const crownGeo = new THREE.ConeGeometry(1.1, 2.8, 7);
const crownMat = new THREE.MeshPhongMaterial({ color: 0x2D5A27 });
const TREE_COUNT = 260;
const trunks = new THREE.InstancedMesh(trunkGeo, trunkMat, TREE_COUNT);
const crowns = new THREE.InstancedMesh(crownGeo, crownMat, TREE_COUNT);
trunks.castShadow = true;
crowns.castShadow = true;
const _m = new THREE.Matrix4();
let _treeIdx = 0;

function placeTreeCluster(cx, cz, count) {
  for (let i = 0; i < count; i++) {
    if (_treeIdx >= TREE_COUNT) break;
    const x = cx + (Math.random() - 0.5) * 10;
    const z = cz + (Math.random() - 0.5) * 10;
    const gy = getTerrainY(x, z);
    const s = 0.7 + Math.random() * 0.7;
    _m.makeScale(s, s, s);
    _m.setPosition(x, gy + 0.8 * s, z);
    trunks.setMatrixAt(_treeIdx, _m);
    _m.setPosition(x, gy + (0.8 + 1.8) * s, z);
    crowns.setMatrixAt(_treeIdx, _m);
    _treeIdx++;
  }
}

// Clusters along road sides
for (let z = -190; z <= 190; z += 30) {
  placeTreeCluster(-18 + Math.random() * 6, z, 5);
  placeTreeCluster( 18 - Math.random() * 6, z, 5);
}
// Custom dense clusters
placeTreeCluster( 20, -100, 30);
placeTreeCluster(-25,   50, 40);
// Fill remaining slots with scattered trees
while (_treeIdx < TREE_COUNT) {
  const side = Math.random() > 0.5 ? 1 : -1;
  placeTreeCluster(side * (12 + Math.random() * 14), (Math.random() - 0.5) * 400, 1);
}
trunks.instanceMatrix.needsUpdate = true;
crowns.instanceMatrix.needsUpdate = true;
scene.add(trunks, crowns);

// Rocks
const rockGeo = new THREE.DodecahedronGeometry(0.5, 0);
const rockMat = new THREE.MeshPhongMaterial({ color: 0x888880 });
const ROCK_COUNT = 80;
const rocks = new THREE.InstancedMesh(rockGeo, rockMat, ROCK_COUNT);
rocks.castShadow = true;
for (let i = 0; i < ROCK_COUNT; i++) {
  const side = Math.random() > 0.5 ? 1 : -1;
  const x = side * (4.5 + Math.random() * 10);
  const z = (Math.random() - 0.5) * 480;
  const s = 0.3 + Math.random() * 0.9;
  _m.makeScale(s, s * 0.65, s);
  _m.setPosition(x, getTerrainY(x, z) + 0.15, z);
  rocks.setMatrixAt(i, _m);
}
scene.add(rocks);

// ─── CAR ────────────────────────────────────────────────────────────────────
let car = null;
const carState = { x: 0, z: 0, angle: Math.PI, speed: 0 };

// Placeholder box while GLB loads
const placeholder = new THREE.Mesh(
  new THREE.BoxGeometry(2.0, 0.9, 4.2),
  new THREE.MeshPhongMaterial({ color: 0xFF6B00 })
);
placeholder.position.y = 0.45;
placeholder.castShadow = true;
scene.add(placeholder);
car = placeholder;

// Load GLB — car2_opt.glb has real materials + textures
MeshoptDecoder.ready.then(() => {
  const gltf = new GLTFLoader();
  gltf.setMeshoptDecoder(MeshoptDecoder);
  gltf.load(
    'car2_opt.glb',
    (loaded) => {
      const model = loaded.scene;

      // Fit to ~4.5 units
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      model.scale.setScalar(4.5 / maxDim);

      // Center at bottom
      box.setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= box.min.y;

      // Enable shadows + DoubleSide fix for quantized normals
      model.traverse(c => {
        if (!c.isMesh) return;
        c.castShadow = true;
        c.receiveShadow = true;
        if (c.material) {
          const mats = Array.isArray(c.material) ? c.material : [c.material];
          mats.forEach(m => { m.side = THREE.DoubleSide; });
        }
      });

      // Rotate to face forward — change to 0 / -Math.PI/2 if sideways
      model.rotation.y = Math.PI / 2;

      const pivot = new THREE.Group();
      pivot.add(model);
      scene.remove(placeholder);
      scene.add(pivot);
      car = pivot;
      renderer.shadowMap.needsUpdate = true;
      hideLoading();
    },
    (prog) => {
      if (prog.total) {
        document.getElementById('load-bar').style.width =
          Math.round((prog.loaded / prog.total) * 90) + '%';
      }
    },
    (err) => {
      console.warn('GLB load error:', err);
      hideLoading();
    }
  );
});

function hideLoading() {
  const el = document.getElementById('loading');
  document.getElementById('load-bar').style.width = '100%';
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.style.display = 'none', 500);
  }, 300);
}

// ─── ARCADE PHYSICS ─────────────────────────────────────────────────────────
const CFG = {
  maxSpeed:   22,   // m/s  (~80 km/h)
  accel:       9,
  brake:      16,
  friction:    4,
  maxSteer:  0.042,
};

function updateCar(dt) {
  const { x: ix, y: iy } = getInput();

  // Steering only when moving
  if (Math.abs(carState.speed) > 0.5) {
    carState.angle -= ix * CFG.maxSteer * (carState.speed / CFG.maxSpeed);
  }

  // Throttle / brake
  if (iy > 0.05) {
    carState.speed = Math.min(carState.speed + CFG.accel * dt * iy, CFG.maxSpeed);
  } else if (iy < -0.05) {
    carState.speed = Math.max(carState.speed + CFG.brake * dt * iy, -CFG.maxSpeed * 0.4);
  } else {
    const fr = CFG.friction * dt;
    carState.speed = Math.abs(carState.speed) < fr ? 0 : carState.speed - Math.sign(carState.speed) * fr;
  }

  // Position
  carState.z += Math.cos(carState.angle) * carState.speed * dt;
  carState.x += Math.sin(carState.angle) * carState.speed * dt;

  if (car) {
    car.position.set(carState.x, getTerrainY(carState.x, carState.z), carState.z);
    car.rotation.y = carState.angle;
  }

  // Sun follows car
  sun.position.set(carState.x + 15, 25, carState.z + 10);
  sun.target.position.set(carState.x, 0, carState.z);
  sun.target.updateMatrixWorld();
  renderer.shadowMap.needsUpdate = true;

  // Speed UI
  document.getElementById('speed-value').textContent =
    Math.abs(Math.round(carState.speed * 3.6));
}

// ─── CAMERA ─────────────────────────────────────────────────────────────────
const camPos = new THREE.Vector3();
const camLook = new THREE.Vector3();
const CAM_HEIGHT = 13;
const CAM_BACK   = 10;
const CAM_SMOOTH = 6;

function updateCamera(dt) {
  const tx = carState.x - Math.sin(carState.angle) * CAM_BACK;
  const tz = carState.z - Math.cos(carState.angle) * CAM_BACK;
  camPos.set(tx, CAM_HEIGHT, tz);
  camera.position.lerp(camPos, CAM_SMOOTH * dt);
  camLook.set(carState.x, 1.0, carState.z);
  camera.lookAt(camLook);
}

// ─── MINIMAP ────────────────────────────────────────────────────────────────
const mmCtx = document.getElementById('minimap-canvas').getContext('2d');

function drawMinimap() {
  mmCtx.clearRect(0, 0, 88, 88);
  // Bg
  mmCtx.fillStyle = 'rgba(20,20,20,0.7)';
  mmCtx.beginPath();
  mmCtx.roundRect(0, 0, 88, 88, 8);
  mmCtx.fill();
  // Road line
  mmCtx.strokeStyle = 'rgba(180,150,100,0.6)';
  mmCtx.lineWidth = 6;
  mmCtx.beginPath();
  mmCtx.moveTo(44, 0);
  mmCtx.lineTo(44, 88);
  mmCtx.stroke();
  // Route progress dot
  mmCtx.fillStyle = '#FF6B00';
  mmCtx.beginPath();
  mmCtx.arc(44 + carState.x * 0.8, 44, 5, 0, Math.PI * 2);
  mmCtx.fill();
  // Heading arrow
  mmCtx.save();
  mmCtx.translate(44 + carState.x * 0.8, 44);
  mmCtx.rotate(-carState.angle + Math.PI);
  mmCtx.fillStyle = '#fff';
  mmCtx.beginPath();
  mmCtx.moveTo(0, -7);
  mmCtx.lineTo(4, 4);
  mmCtx.lineTo(0, 1);
  mmCtx.lineTo(-4, 4);
  mmCtx.closePath();
  mmCtx.fill();
  mmCtx.restore();
}

// ─── TERRAIN SWITCH ─────────────────────────────────────────────────────────
window.setTerrain = function(mode) {
  currentTerrain = mode;
  const c = terrainColors[mode];
  groundMat.color.set(c.ground);
  roadMat.color.set(c.road);
  scene.background = new THREE.Color(c.sky);
  scene.fog.color.set(c.fog);
  hemi.groundColor.set(c.ground);
  document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.t-btn').forEach(b => {
    if (b.querySelector('.label').textContent.toLowerCase().includes(
      mode === 'rock' ? 'кам' : mode === 'sand' ? 'пес' : 'сне'
    )) b.classList.add('active');
  });
  // Adjust tree colors for snow
  if (mode === 'snow') {
    crownMat.color.set(0x8899aa);
    groundMat.color.set(0xd8e8f0);
  } else if (mode === 'sand') {
    crownMat.color.set(0x8aaa55);
  } else {
    crownMat.color.set(0x2D5A27);
  }
};

// ─── CONTROLS ───────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup',   e => { keys[e.key] = false; });

const jBase  = document.getElementById('joystick-base');
const jKnob  = document.getElementById('joystick-knob');
const JR     = 28; // radius
let joy = { x: 0, y: 0, active: false, ox: 0, oy: 0 };

function joyStart(e) {
  e.preventDefault();
  const t = e.touches ? e.touches[0] : e;
  const r = jBase.getBoundingClientRect();
  joy.active = true;
  joy.ox = r.left + r.width / 2;
  joy.oy = r.top + r.height / 2;
}
function joyMove(e) {
  if (!joy.active) return;
  e.preventDefault();
  const t = e.touches ? e.touches[0] : e;
  let dx = t.clientX - joy.ox;
  let dy = t.clientY - joy.oy;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > JR) { dx = dx / dist * JR; dy = dy / dist * JR; }
  joy.x = dx / JR;
  joy.y = -dy / JR;
  jKnob.style.transform = `translate(${dx}px,${dy}px)`;
}
function joyEnd(e) {
  joy.active = false;
  joy.x = 0;
  joy.y = 0;
  jKnob.style.transform = 'translate(0,0)';
}
jBase.addEventListener('touchstart', joyStart, { passive: false });
window.addEventListener('touchmove', joyMove,  { passive: false });
window.addEventListener('touchend',  joyEnd);
jBase.addEventListener('mousedown', joyStart);
window.addEventListener('mousemove', e => { if (joy.active) joyMove(e); });
window.addEventListener('mouseup', joyEnd);

function getInput() {
  if (joy.active) return { x: joy.x, y: joy.y };
  let x = 0, y = 0;
  if (keys['ArrowUp']    || keys['w'] || keys['W'] || keys['ц'] || keys['Ц']) y =  1;
  if (keys['ArrowDown']  || keys['s'] || keys['S'] || keys['ы'] || keys['Ы']) y = -1;
  if (keys['ArrowLeft']  || keys['a'] || keys['A'] || keys['ф'] || keys['Ф']) x = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || keys['в'] || keys['В']) x =  1;
  return { x, y };
}

// ─── ADAPTIVE QUALITY ───────────────────────────────────────────────────────
let frames = 0, fps = 60;
setInterval(() => {
  fps = frames; frames = 0;
  if (fps < 30 && renderer.getPixelRatio() > 1) {
    renderer.setPixelRatio(1);
  } else if (fps > 50 && renderer.getPixelRatio() < Math.min(window.devicePixelRatio, 2)) {
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  }
}, 1000);

// ─── RESIZE ─────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
let last = performance.now();
function loop() {
  requestAnimationFrame(loop);
  const now = performance.now();
  const dt  = Math.min((now - last) / 1000, 0.05);
  last = now;
  frames++;
  updateCar(dt);
  updateCamera(dt);
  drawMinimap();
  renderer.render(scene, camera);
}
loop();
</script>
